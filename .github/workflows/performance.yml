name: Lighthouse Performance Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Build Project
        run: npm run build

      - name: Run Lighthouse CI
        run: npm run lighthouse:ci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          include-hidden-files: true
          retention-days: 30

      - name: Comment PR with Results
        uses: actions/github-script@v8
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const manifestPath = '.lighthouseci/manifest.json';
            if (!fs.existsSync(manifestPath)) {
              core.setFailed(`Lighthouse manifest not found at ${manifestPath}`);
              return;
            }

            const results = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const result = results.find(entry => entry.isRepresentativeRun) || results[0];
            if (!result?.summary) {
              core.setFailed('Lighthouse manifest does not contain a scored report');
              return;
            }

            const scores = result.summary;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            const comment = `## 🏆 Lighthouse Performance Results
            
            | Category | Score |
            |----------|-------|
            | 🚀 Performance | ${scores.performance * 100}/100 |
            | ♿ Accessibility | ${scores.accessibility * 100}/100 |
            | ✅ Best Practices | ${scores['best-practices'] * 100}/100 |
            | 🔍 SEO | ${scores.seo * 100}/100 |
            
            [Download full Lighthouse reports](${runUrl})`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  performance-budget:
    name: Performance Budget Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Build Project
        run: npm run build

      - name: Check Performance Budget
        run: |
          npm run preview -- --host 127.0.0.1 > /tmp/vite-preview.log 2>&1 &
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173 > /dev/null && break
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4173 > /dev/null
          npx lighthouse http://127.0.0.1:4173 \
            --budget-path=./config/performance-budget.json \
            --output=json \
            --output-path=./budget-results.json \
            --chrome-flags="--headless=new"

      - name: Upload Budget Results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: budget-results
          path: budget-results.json
          retention-days: 30
